services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ci_db
      POSTGRES_USER: ci_user
      POSTGRES_PASSWORD: ci_password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      sh -c "./scripts/wait-for-db.sh &&
             python manage.py migrate &&
             python manage.py test --keepdb"
    environment:
      DJANGO_SETTINGS_MODULE: stockq.settings.ci
    env_file:
      - .env
    depends_on:
      - db
      - redis