name: Django CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Create .env file from secrets
        run: |
          echo "FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env

      - name: Run CI with Docker Compose
        run: docker compose -f docker-compose.dev.yml -f docker-compose.ci.yml up --build --exit-code-from web

      - name: Show logs
        if: always()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.ci.yml logs

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.dev.yml -f docker-compose.ci.yml down -v